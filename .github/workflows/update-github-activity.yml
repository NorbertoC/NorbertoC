name: Update GitHub Activity

on:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate activity graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/update-github-activity.mjs

      - name: Commit updated graph
        run: |
          if git diff --quiet -- assets/github-activity-*.svg; then
            echo "Activity graphs are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-activity-*.svg
          git commit -m "Update GitHub activity graphs"
          git push
